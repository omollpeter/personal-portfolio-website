<svg viewBox="0 0 90 60" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
<style>
  .logo-curly-left {
    stroke-dasharray: 1;
    animation: drawLeftCurly 5s cubic-bezier(0.65, 0, 0.35, 1) infinite;
  }
  .logo-curly-right {
    stroke-dasharray: 1;
    animation: drawRightCurly 5s cubic-bezier(0.65, 0, 0.35, 1) infinite;
  }
  .logo-letter-o {
    opacity: 0;
    animation: fadeO 5s ease infinite;
  }
  .logo-letter-m {
    opacity: 0;
    animation: fadeM 5s ease infinite;
  }
 
  @keyframes drawLeftCurly {
    0%   { stroke-dashoffset: 1; }
    8%   { stroke-dashoffset: 0; }
    78%  { stroke-dashoffset: 0; }
    86%  { stroke-dashoffset: 1; }
    100% { stroke-dashoffset: 1; }
  }
 
  @keyframes drawRightCurly {
    0%   { stroke-dashoffset: 1; }
    22%  { stroke-dashoffset: 1; }
    30%  { stroke-dashoffset: 0; }
    60%  { stroke-dashoffset: 0; }
    66%  { stroke-dashoffset: 1; }
    100% { stroke-dashoffset: 1; }
  }
 
  @keyframes fadeO {
    0%   { opacity: 0; }
    8%   { opacity: 0; }
    14%  { opacity: 1; }
    72%  { opacity: 1; }
    78%  { opacity: 0; }
    100% { opacity: 0; }
  }
 
  @keyframes fadeM {
    0%   { opacity: 0; }
    14%  { opacity: 0; }
    22%  { opacity: 1; }
    66%  { opacity: 1; }
    72%  { opacity: 0; }
    100% { opacity: 0; }
  }
</style>
